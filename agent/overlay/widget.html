<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 200px;
    height: 58px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-app-region: no-drag;
    user-select: none;
  }

  .widget {
    width: 100%;
    height: 100%;
    background: rgba(15, 15, 20, 0.78);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 13px;
    border: 1px solid rgba(255, 255, 255, 0.10);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #6b7280;
    flex-shrink: 0;
    transition: background 0.35s ease;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(1.4); opacity: 0.65; }
  }

  .text { flex: 1; min-width: 0; }

  .title {
    font-size: 12px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.01em;
  }

  .subtitle {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.48);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="dot" id="dot"></div>
  <div class="text">
    <div class="title">Jarvis</div>
    <div class="subtitle" id="sub">idle</div>
  </div>
</div>
<script>
  const dot = document.getElementById('dot')
  const sub = document.getElementById('sub')

  const COLORS = {
    executing: '#22c55e',
    thinking:  '#3b82f6',
    error:     '#ef4444',
    idle:      '#6b7280',
    done:      '#6b7280',
  }

  window.jarvis.onStatus(({ event, tool }) => {
    const color = COLORS[event] ?? COLORS.idle
    dot.style.background = color
    dot.className = 'dot' + (['executing', 'thinking'].includes(event) ? ' pulse' : '')

    if (event === 'executing') {
      sub.textContent = (tool ?? 'running').replace(/_/g, ' ')
    } else if (event === 'thinking') {
      sub.textContent = 'thinking\u2026'
    } else if (event === 'error') {
      sub.textContent = 'error'
    } else {
      sub.textContent = 'idle'
    }
  })
</script>
</body>
</html>
